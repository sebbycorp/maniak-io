<!DOCTYPE html>
<html lang="{{ .Site.LanguageCode }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ if not .IsHome }}{{ .Title }} | {{ end }}{{ .Site.Title }}</title>
  <meta name="description" content="{{ with .Description }}{{ . }}{{ else }}{{ .Site.Params.description }}{{ end }}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:ital,opsz,wght@0,14..32,400;0,14..32,500;0,14..32,600;0,14..32,700;1,14..32,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <meta name="theme-color" content="#FAFAFA">
  <link rel="stylesheet" href="{{ "css/style.css" | relURL }}">
  <link rel="stylesheet" href="{{ "css/syntax.css" | relURL }}">
  <style>
    .mk-prose a.mk-zoom { display: block; cursor: zoom-in; }
    .mk-prose a.mk-zoom img { display: block; }
    .mk-lightbox { position: fixed; inset: 0; background: rgba(13,17,23,0.92); display: none; align-items: center; justify-content: center; z-index: 1000; padding: 24px; cursor: zoom-out; }
    .mk-lightbox.open { display: flex; }
    .mk-lightbox img { max-width: 96vw; max-height: 92vh; width: auto; height: auto; border-radius: 8px; box-shadow: 0 10px 40px rgba(0,0,0,0.5); }
    .mk-lightbox-close { position: absolute; top: 18px; right: 24px; background: none; border: none; color: #fff; font-size: 40px; line-height: 1; cursor: pointer; opacity: 0.85; }
    .mk-lightbox-close:hover { opacity: 1; }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js"></script>
  <script>
    (function() {
      var mkVars = {
        primaryColor: '#FFFFFF',
        primaryTextColor: '#0A0A0B',
        primaryBorderColor: '#E11D28',
        lineColor: '#52525B',
        secondaryColor: '#FAFAFA',
        secondaryTextColor: '#0A0A0B',
        secondaryBorderColor: '#E4E4E7',
        tertiaryColor: '#F4F4F5',
        tertiaryTextColor: '#0A0A0B',
        tertiaryBorderColor: '#D4D4D8',
        noteBkgColor: '#F7FEE7',
        noteTextColor: '#0A0A0B',
        noteBorderColor: '#65A30D',
        actorBkg: '#FFFFFF',
        actorTextColor: '#0A0A0B',
        actorBorder: '#E11D28',
        actorLineColor: '#A1A1AA',
        signalColor: '#0A0A0B',
        signalTextColor: '#0A0A0B',
        labelBoxBkgColor: '#F4F4F5',
        labelBoxBorderColor: '#E4E4E7',
        labelTextColor: '#0A0A0B',
        loopTextColor: '#27272A',
        activationBkgColor: '#FFFFFF',
        activationBorderColor: '#E11D28',
        sequenceNumberColor: '#FFFFFF',
        background: '#FAFAFA',
        mainBkg: '#FFFFFF',
        nodeBorder: '#E11D28',
        clusterBkg: '#FAFAFA',
        clusterBorder: '#E4E4E7',
        titleColor: '#E11D28',
        edgeLabelBackground: '#FAFAFA',
        nodeTextColor: '#0A0A0B'
      };
      mermaid.initialize({
        startOnLoad: false,
        theme: 'base',
        themeVariables: mkVars,
        securityLevel: 'loose',
        fontFamily: '"Inter", ui-sans-serif, sans-serif',
        flowchart: { curve: 'basis', padding: 20 },
        sequence: { mirrorActors: false, bottomMarginAdj: 2, actorFontSize: 14, noteFontSize: 13, messageFontSize: 13 }
      });
    })();
  </script>
</head>
<body>
  {{ partial "header.html" . }}

  <main class="site-main">
    {{ block "main" . }}{{ end }}
  </main>

  {{ partial "footer.html" . }}

  <script>
    // Convert mermaid code blocks to mermaid divs
    document.addEventListener('DOMContentLoaded', function() {
      document.querySelectorAll('pre > code.language-mermaid').forEach(function(el) {
        var pre = el.parentElement;
        var div = document.createElement('div');
        div.className = 'mermaid';
        div.textContent = el.textContent;
        pre.parentElement.replaceChild(div, pre);
      });
      if (typeof mermaid !== 'undefined') {
        var runMermaid = function() { mermaid.run(); };
        if (document.fonts && document.fonts.ready) {
          document.fonts.ready.then(runMermaid, runMermaid);
        } else {
          runMermaid();
        }
      }
    });

    // Mobile nav toggle
    document.addEventListener('DOMContentLoaded', function() {
      var toggle = document.querySelector('.mk-nav-toggle');
      var nav = document.querySelector('.mk-nav');
      if (toggle && nav) {
        toggle.addEventListener('click', function() { nav.classList.toggle('open'); });
      }
    });

    // Click / press-to-zoom lightbox for article images
    document.addEventListener('DOMContentLoaded', function() {
      var overlay = document.createElement('div');
      overlay.className = 'mk-lightbox';
      overlay.setAttribute('role', 'dialog');
      overlay.setAttribute('aria-label', 'Zoomed image');
      overlay.innerHTML = '<button class="mk-lightbox-close" aria-label="Close">&times;</button><img alt="">';
      document.body.appendChild(overlay);
      var lbImg = overlay.querySelector('img');

      function open(src, alt) {
        lbImg.src = src; lbImg.alt = alt || '';
        overlay.classList.add('open');
        document.body.style.overflow = 'hidden';
      }
      function close() {
        overlay.classList.remove('open');
        document.body.style.overflow = '';
        lbImg.src = '';
      }

      document.querySelectorAll('.mk-prose a.mk-zoom').forEach(function(a) {
        a.addEventListener('click', function(e) {
          e.preventDefault();
          var img = a.querySelector('img');
          open(a.getAttribute('href'), img ? img.alt : '');
        });
      });

      overlay.addEventListener('click', close);
      document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape' && overlay.classList.contains('open')) close();
      });
    });
  </script>
</body>
</html>
