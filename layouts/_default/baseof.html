<!DOCTYPE html>
<html lang="{{ .Site.LanguageCode }}" data-theme="dark">
<head>
  <script>
    (function() {
      var t = localStorage.getItem('theme') || 'dark';
      document.documentElement.setAttribute('data-theme', t);
    })();
  </script>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ if not .IsHome }}{{ .Title }} | {{ end }}{{ .Site.Title }}</title>
  <meta name="description" content="{{ with .Description }}{{ . }}{{ else }}{{ .Site.Params.description }}{{ end }}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Comic+Neue:wght@400;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ "css/style.css" | relURL }}">
  <link rel="stylesheet" href="{{ "css/syntax.css" | relURL }}">
  <script src="https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js"></script>
  <script>
    (function() {
      var t = localStorage.getItem('theme') || 'dark';
      mermaid.initialize({
        startOnLoad: true,
        theme: t === 'light' ? 'default' : 'dark',
        securityLevel: 'loose'
      });
    })();
  </script>
  {{ if .Site.Params.analytics.google }}
  <script async src="https://www.googletagmanager.com/gtag/js?id={{ .Site.Params.analytics.google }}"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', '{{ .Site.Params.analytics.google }}');
  </script>
  {{ end }}
</head>
<body>
  {{ partial "header.html" . }}

  <main class="site-main">
    {{ block "main" . }}{{ end }}
  </main>

  {{ partial "footer.html" . }}

  <script>
    function toggleTheme() {
      var current = document.documentElement.getAttribute('data-theme');
      var next = current === 'light' ? 'dark' : 'light';
      document.documentElement.setAttribute('data-theme', next);
      localStorage.setItem('theme', next);
      // Re-init mermaid with new theme
      if (typeof mermaid !== 'undefined') {
        mermaid.initialize({ theme: next === 'light' ? 'default' : 'dark', securityLevel: 'loose' });
      }
    }

    // Convert mermaid code blocks to mermaid divs
    document.addEventListener('DOMContentLoaded', function() {
      document.querySelectorAll('pre > code.language-mermaid').forEach(function(el) {
        var pre = el.parentElement;
        var div = document.createElement('pre');
        div.className = 'mermaid';
        div.textContent = el.textContent;
        pre.parentElement.replaceChild(div, pre);
      });
      if (typeof mermaid !== 'undefined') { mermaid.run(); }
    });

    document.addEventListener('DOMContentLoaded', function() {
      const toggle = document.querySelector('.nav-toggle');
      const nav = document.querySelector('.site-nav');
      if (toggle && nav) {
        toggle.addEventListener('click', function() {
          nav.classList.toggle('open');
        });
      }
    });

    // Search
    (function() {
      var input = document.getElementById('search-input');
      var results = document.getElementById('search-results');
      if (!input || !results) return;
      var articles = null;

      function loadIndex() {
        if (articles) return Promise.resolve(articles);
        return fetch('/index.json')
          .then(function(r) { return r.json(); })
          .then(function(data) { articles = data; return data; });
      }

      function esc(s) { return s.replace(/[&<>"']/g, function(c) { return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]; }); }

      function highlightMatch(text, query) {
        if (!query) return esc(text);
        var safe = esc(text);
        var regex = new RegExp('(' + query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + ')', 'gi');
        return safe.replace(regex, '<mark>$1</mark>');
      }

      function doSearch(query) {
        if (!query || query.length < 2) {
          results.innerHTML = '';
          results.style.display = 'none';
          return;
        }
        loadIndex().then(function(data) {
          var q = query.toLowerCase();
          var matches = data.filter(function(a) {
            return a.title.toLowerCase().indexOf(q) !== -1 ||
                   a.content.toLowerCase().indexOf(q) !== -1 ||
                   (a.tags && a.tags.some(function(t) { return t.toLowerCase().indexOf(q) !== -1; })) ||
                   (a.categories && a.categories.some(function(c) { return c.toLowerCase().indexOf(q) !== -1; }));
          });

          if (!matches.length) {
            results.innerHTML = '<div class="search-empty">No results for "' + esc(query) + '"</div>';
            results.style.display = 'block';
            return;
          }

          var html = matches.slice(0, 6).map(function(a) {
            var tags = (a.tags || []).slice(0, 3).map(function(t) {
              return '<span class="tag-pill tag-sm">' + esc(t) + '</span>';
            }).join('');
            return '<a href="' + a.url + '" class="search-result-item">' +
              '<div class="search-result-title">' + highlightMatch(a.title, query) + '</div>' +
              '<div class="search-result-meta">' + esc(a.date) + (tags ? ' ' + tags : '') + '</div>' +
              '</a>';
          }).join('');

          results.innerHTML = html;
          results.style.display = 'block';
        });
      }

      var timer;
      input.addEventListener('input', function() {
        clearTimeout(timer);
        timer = setTimeout(function() { doSearch(input.value.trim()); }, 200);
      });

      input.addEventListener('keydown', function(e) {
        if (e.key === 'Escape') {
          input.value = '';
          results.innerHTML = '';
          results.style.display = 'none';
          input.blur();
        }
      });

      input.addEventListener('focus', function() {
        if (input.value.trim().length >= 2) doSearch(input.value.trim());
      });

      // Close results when clicking outside
      document.addEventListener('click', function(e) {
        if (!e.target.closest('.header-search')) {
          results.style.display = 'none';
        }
      });

      // / shortcut to focus
      document.addEventListener('keydown', function(e) {
        if (e.key === '/' && document.activeElement !== input && document.activeElement.tagName !== 'INPUT' && document.activeElement.tagName !== 'TEXTAREA') {
          e.preventDefault();
          input.focus();
        }
      });
    })();
  </script>
</body>
</html>
