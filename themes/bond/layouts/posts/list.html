{{ define "main" }}
<section class="mk-archive-hero">
  <div class="mk-archive-rings"></div>
  <div class="mk-wrap">
    <div class="mk-kicker"><span class="mk-kicker-bar"></span>ON X</div>
    <h1 class="mk-archive-title">Posts</h1>
    <p class="mk-archive-sub">Latest from X / Twitter — @{{ .Site.Params.twitterHandle }}.</p>
  </div>
</section>
<section class="mk-wrap mk-section mk-yt">
  <div class="mk-yt-card mk-posts-embed">
    <a class="twitter-timeline" data-chrome="noheader nofooter noborders transparent" data-height="800" href="https://twitter.com/{{ .Site.Params.twitterHandle }}">Posts by @{{ .Site.Params.twitterHandle }}</a>
    <script async src="https://platform.twitter.com/widgets.js" charset="utf-8"></script>
  </div>
  <div class="mk-yt-cta">
    <a href="https://x.com/SebbyCorp/articles" target="_blank" rel="noopener" class="mk-btn mk-btn-red">View articles on X →</a>
  </div>
</section>
{{ end }}
