{{ define "main" }}
<div class="section-header">
  <h2>{{ .Title }}</h2>
  {{ with .Description }}<p>{{ . }}</p>{{ end }}
</div>
<div class="comic-grid">
  {{ range $i, $p := .Pages }}
  <div class="article-card{{ if eq $i 0 }} card-featured{{ end }}{{ if and (gt $i 0) (lt $i 3) }} card-wide{{ end }}">
    <a href="{{ $p.Permalink }}">
      <div class="card-accent-bar"></div>
      <div class="card-body">
        <div class="meta">{{ $p.Date.Format "02 Jan 2006" }}</div>
        <h3>{{ $p.Title }}</h3>
        <p class="summary">{{ $p.Summary | truncate 150 }}</p>
        <span class="read-more">Read more</span>
      </div>
    </a>
  </div>
  {{ end }}
</div>
{{ end }}
