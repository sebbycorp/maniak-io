{{ define "main" }}
<section class="mk-archive-hero">
  <div class="mk-archive-rings"></div>
  <div class="mk-wrap">
    <div class="mk-kicker"><span class="mk-kicker-bar"></span>ON YOUTUBE</div>
    <h1 class="mk-archive-title">YouTube</h1>
    <p class="mk-archive-sub">Videos, live streams, and walkthroughs from the channel.</p>
  </div>
</section>
<section class="mk-wrap mk-section mk-yt">
  <div class="mk-yt-grid">
    <div class="mk-yt-card">
      <h3 class="mk-yt-card-title">Latest from the Channel</h3>
      <div class="mk-yt-frame">
        <iframe src="https://www.youtube.com/embed/videoseries?list=UUAP1CQwTOLlplBAODlmF2Vw" title="Latest YouTube Video" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
      </div>
    </div>
    <div class="mk-yt-card">
      <h3 class="mk-yt-card-title">Live Streams</h3>
      <div class="mk-yt-frame">
        <iframe src="https://www.youtube.com/embed/live_stream?channel=UCAP1CQwTOLlplBAODlmF2Vw" title="Live Stream" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
      </div>
    </div>
  </div>
  <div class="mk-yt-cta">
    <a href="{{ .Site.Params.youtubeChannel }}" target="_blank" rel="noopener" class="mk-btn mk-btn-red">Visit the full channel →</a>
  </div>
</section>
{{ end }}
