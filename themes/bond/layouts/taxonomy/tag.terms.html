{{ define "main" }}
<div class="section-header">
  <h2>All Tags</h2>
  <p>Browse articles by topic</p>
</div>
<div class="tags-overview">
  {{ range .Site.Taxonomies.tags.Alphabetical }}
  <a href="{{ .Page.Permalink }}" class="tag-card">
    <span class="tag-card-name">{{ .Page.Title }}</span>
    <span class="tag-card-count">{{ .Count }}</span>
  </a>
  {{ end }}
</div>
{{ end }}
