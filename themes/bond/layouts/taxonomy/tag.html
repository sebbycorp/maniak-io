{{ define "main" }}
<section class="mk-archive-hero">
  <div class="mk-archive-rings"></div>
  <div class="mk-wrap">
    <div class="mk-kicker"><span class="mk-kicker-bar"></span>TAG</div>
    <h1 class="mk-archive-title">#{{ .Title }}</h1>
    <p class="mk-archive-sub">{{ len .Pages }} article{{ if gt (len .Pages) 1 }}s{{ end }} tagged “{{ .Title }}”.</p>
    <div class="mk-chips mk-chips-tags">
      {{ range .Site.Taxonomies.tags.ByCount }}
      <a href="{{ .Page.Permalink }}" class="mk-chip mk-chip-tag{{ if eq .Page.Title $.Title }} active{{ end }}">{{ .Page.Title }} <span class="mk-chip-count">{{ .Count }}</span></a>
      {{ end }}
    </div>
  </div>
</section>
<section class="mk-wrap mk-section">
  <div class="mk-grid">
    {{ range .Pages }}{{ partial "article-card.html" . }}{{ end }}
  </div>
</section>
{{ end }}
