<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 880" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">
  <defs>
    <linearGradient id="gwGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a2240"/>
      <stop offset="100%" stop-color="#1e2a4a"/>
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto" fill="#484f58">
      <polygon points="0 0, 10 3.5, 0 7"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1200" height="880" fill="#0d1117"/>

  <!-- Title -->
  <text x="600" y="42" text-anchor="middle" fill="#f0f6fc" font-size="24" font-weight="700">GitHub MCP Token Economics</text>
  <text x="600" y="66" text-anchor="middle" fill="#8b949e" font-size="13">One gateway, three tool modes — measuring the token cost of GitHub's MCP catalog</text>

  <!-- ===== LAYER 1: TEST HARNESS ===== -->
  <rect x="40" y="90" width="1120" height="115" rx="12" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <rect x="40" y="90" width="1120" height="28" rx="12" fill="#21262d"/>
  <text x="60" y="109" fill="#8b949e" font-size="11" font-weight="600" letter-spacing="1.5">TEST HARNESS&#160;&#160;·&#160;&#160;MODEL: gpt-5.5</text>

  <rect x="90" y="130" width="480" height="60" rx="8" fill="#0d1117" stroke="#30363d" stroke-width="1"/>
  <text x="110" y="154" fill="#f0f6fc" font-size="14" font-weight="600" font-family="monospace">gh_questions.py</text>
  <text x="110" y="176" fill="#8b949e" font-size="11">5 questions × 3 modes&#160;&#160;→&#160;&#160;single-call cost</text>

  <rect x="630" y="130" width="480" height="60" rx="8" fill="#0d1117" stroke="#30363d" stroke-width="1"/>
  <text x="650" y="154" fill="#f0f6fc" font-size="14" font-weight="600" font-family="monospace">gh_conversation.py</text>
  <text x="650" y="176" fill="#8b949e" font-size="11">5-turn chat × 3 modes&#160;&#160;→&#160;&#160;conversation cost</text>

  <text x="600" y="230" text-anchor="middle" fill="#484f58" font-size="16">↓&#160;&#160;&#160;HTTP via&#160;&#160;/openai&#160;&#160;and&#160;&#160;/mcp/gh-*&#160;&#160;&#160;↓</text>

  <!-- ===== LAYER 2: GATEWAY ===== -->
  <rect x="40" y="245" width="1120" height="235" rx="12" fill="url(#gwGrad)" stroke="#58a6ff" stroke-width="2"/>
  <rect x="40" y="245" width="1120" height="28" rx="12" fill="#21262d"/>
  <text x="60" y="264" fill="#58a6ff" font-size="11" font-weight="600" letter-spacing="1.5">agentgateway PROXY&#160;&#160;·&#160;&#160;kind cluster</text>

  <!-- Routes -->
  <rect x="70" y="285" width="600" height="40" rx="6" fill="rgba(88,166,255,0.08)" stroke="rgba(88,166,255,0.3)" stroke-width="1"/>
  <text x="88" y="310" fill="#79c0ff" font-size="13" font-family="monospace" font-weight="600">/openai</text>
  <text x="250" y="310" fill="#8b949e" font-size="13">→</text>
  <text x="272" y="310" fill="#c9d1d9" font-size="13">OpenAI&#160;&#160;·&#160;&#160;gpt-5.5</text>

  <rect x="70" y="331" width="600" height="40" rx="6" fill="rgba(88,166,255,0.08)" stroke="rgba(88,166,255,0.3)" stroke-width="1"/>
  <text x="88" y="356" fill="#79c0ff" font-size="13" font-family="monospace" font-weight="600">/mcp/gh-std</text>
  <text x="250" y="356" fill="#8b949e" font-size="13">→</text>
  <text x="272" y="356" fill="#c9d1d9" font-size="13">GitHub MCP backend</text>
  <rect x="540" y="341" width="110" height="22" rx="11" fill="#2e1a1a" stroke="#f85149" stroke-width="1"/>
  <text x="595" y="356" text-anchor="middle" fill="#f85149" font-size="10" font-weight="600">Standard</text>

  <rect x="70" y="377" width="600" height="40" rx="6" fill="rgba(88,166,255,0.08)" stroke="rgba(88,166,255,0.3)" stroke-width="1"/>
  <text x="88" y="402" fill="#79c0ff" font-size="13" font-family="monospace" font-weight="600">/mcp/gh-search</text>
  <text x="250" y="402" fill="#8b949e" font-size="13">→</text>
  <text x="272" y="402" fill="#c9d1d9" font-size="13">GitHub MCP backend</text>
  <rect x="540" y="387" width="110" height="22" rx="11" fill="#122117" stroke="#238636" stroke-width="1"/>
  <text x="595" y="402" text-anchor="middle" fill="#56d364" font-size="10" font-weight="600">Search</text>

  <rect x="70" y="423" width="600" height="40" rx="6" fill="rgba(88,166,255,0.08)" stroke="rgba(88,166,255,0.3)" stroke-width="1"/>
  <text x="88" y="448" fill="#79c0ff" font-size="13" font-family="monospace" font-weight="600">/mcp/gh-code</text>
  <text x="250" y="448" fill="#8b949e" font-size="13">→</text>
  <text x="272" y="448" fill="#c9d1d9" font-size="13">GitHub MCP backend</text>
  <rect x="540" y="433" width="110" height="22" rx="11" fill="#3d2a1a" stroke="#9e6a03" stroke-width="1"/>
  <text x="595" y="448" text-anchor="middle" fill="#d29922" font-size="10" font-weight="600">Code</text>

  <!-- Gateway responsibilities panel -->
  <rect x="700" y="285" width="430" height="178" rx="8" fill="#1a2030" stroke="#58a6ff" stroke-width="1"/>
  <text x="915" y="309" text-anchor="middle" fill="#58a6ff" font-size="12" font-weight="600">GATEWAY RESPONSIBILITIES</text>
  <text x="720" y="335" fill="#c9d1d9" font-size="11.5">• Injects&#160;&#160;Authorization: Bearer &lt;PAT&gt;&#160;&#160;upstream</text>
  <text x="720" y="358" fill="#c9d1d9" font-size="11.5">• Targets&#160;&#160;/mcp/readonly&#160;&#160;— 28 read-only tools</text>
  <text x="720" y="381" fill="#c9d1d9" font-size="11.5">• Pins scope to one sandbox repo</text>
  <text x="720" y="404" fill="#c9d1d9" font-size="11.5">• Sets&#160;&#160;spec.entMcp.toolMode&#160;&#160;per backend</text>
  <text x="720" y="427" fill="#c9d1d9" font-size="11.5">• TLS to GitHub — no MCP pod to run (remote)</text>
  <text x="720" y="450" fill="#c9d1d9" font-size="11.5">• Emits token + cost metrics → Prometheus/Grafana</text>

  <text x="600" y="505" text-anchor="middle" fill="#484f58" font-size="16">↓&#160;&#160;&#160;TLS&#160;&#160;+&#160;&#160;PAT injected&#160;&#160;&#160;↓</text>

  <!-- ===== LAYER 3: UPSTREAM ===== -->
  <rect x="40" y="525" width="1120" height="110" rx="12" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <rect x="40" y="525" width="1120" height="28" rx="12" fill="#21262d"/>
  <text x="60" y="544" fill="#8b949e" font-size="11" font-weight="600" letter-spacing="1.5">UPSTREAM</text>

  <rect x="90" y="565" width="290" height="55" rx="8" fill="#0d1117" stroke="#30363d" stroke-width="1"/>
  <text x="235" y="590" text-anchor="middle" fill="#f0f6fc" font-size="14" font-weight="600">OpenAI</text>
  <text x="235" y="609" text-anchor="middle" fill="#8b949e" font-size="11" font-family="monospace">gpt-5.5</text>

  <rect x="430" y="565" width="360" height="55" rx="8" fill="#0d1117" stroke="#30363d" stroke-width="1"/>
  <text x="610" y="589" text-anchor="middle" fill="#f0f6fc" font-size="14" font-weight="600">GitHub remote MCP</text>
  <text x="610" y="608" text-anchor="middle" fill="#8b949e" font-size="10.5" font-family="monospace">api.githubcopilot.com/mcp/readonly</text>

  <line x1="792" y1="592" x2="828" y2="592" stroke="#484f58" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="830" y="565" width="280" height="55" rx="8" fill="#0d1117" stroke="#30363d" stroke-width="1"/>
  <text x="970" y="589" text-anchor="middle" fill="#f0f6fc" font-size="13" font-weight="600">Sandbox repo (read-only)</text>
  <text x="970" y="608" text-anchor="middle" fill="#8b949e" font-size="10.5" font-family="monospace">sebbycorp/agw-tokenomics-sandbox</text>

  <!-- ===== LAYER 4: TOOL-MODE ECONOMICS ===== -->
  <rect x="40" y="665" width="1120" height="180" rx="12" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <rect x="40" y="665" width="1120" height="28" rx="12" fill="#21262d"/>
  <text x="60" y="684" fill="#8b949e" font-size="11" font-weight="600" letter-spacing="1.5">TOOL-MODE ECONOMICS&#160;&#160;·&#160;&#160;PER-CALL TOOL CONTEXT (DETERMINISTIC)</text>

  <!-- header -->
  <text x="90"  y="717" fill="#8b949e" font-size="12" font-weight="600">Mode</text>
  <text x="400" y="717" text-anchor="middle" fill="#8b949e" font-size="12" font-weight="600">Tools advertised</text>
  <text x="660" y="717" text-anchor="middle" fill="#8b949e" font-size="12" font-weight="600">First-call tokens</text>
  <text x="880" y="717" text-anchor="middle" fill="#8b949e" font-size="12" font-weight="600">vs Standard</text>
  <line x1="70" y1="727" x2="1130" y2="727" stroke="#30363d" stroke-width="1"/>

  <!-- Standard -->
  <text x="90"  y="758" fill="#f85149" font-size="14" font-weight="700">Standard</text>
  <text x="400" y="758" text-anchor="middle" fill="#c9d1d9" font-size="14">28</text>
  <text x="660" y="758" text-anchor="middle" fill="#c9d1d9" font-size="14">4,781</text>
  <text x="880" y="758" text-anchor="middle" fill="#8b949e" font-size="13">baseline</text>

  <!-- Search (highlighted) -->
  <rect x="70" y="772" width="1060" height="34" rx="6" fill="rgba(86,211,100,0.08)"/>
  <text x="90"  y="795" fill="#56d364" font-size="14" font-weight="700">Search</text>
  <text x="400" y="795" text-anchor="middle" fill="#c9d1d9" font-size="14">2</text>
  <text x="660" y="795" text-anchor="middle" fill="#c9d1d9" font-size="14">429</text>
  <text x="880" y="795" text-anchor="middle" fill="#56d364" font-size="14" font-weight="700">−91%</text>
  <text x="1000" y="795" fill="#56d364" font-size="12">← cheapest per call</text>

  <!-- Code -->
  <text x="90"  y="833" fill="#d29922" font-size="14" font-weight="700">Code</text>
  <text x="400" y="833" text-anchor="middle" fill="#c9d1d9" font-size="14">1</text>
  <text x="660" y="833" text-anchor="middle" fill="#c9d1d9" font-size="14">3,021</text>
  <text x="880" y="833" text-anchor="middle" fill="#d29922" font-size="14" font-weight="700">−37%</text>
  <text x="1000" y="833" fill="#8b949e" font-size="12">batches large results</text>

  <!-- Takeaway -->
  <text x="600" y="868" text-anchor="middle" fill="#8b949e" font-size="12">Large catalog ⇒ Search wins: ~60% cheaper per call, and beats Standard across conversations.</text>
</svg>
